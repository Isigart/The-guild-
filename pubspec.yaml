name: guild_game_web
description: Compagnie de Mercenaires - Version Web
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  
  # Stockage web (remplace sqflite)
  shared_preferences: ^2.2.2
  
  # Serialization
  json_annotation: ^4.8.1
  
  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  
  # Utils
  uuid: ^4.2.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
